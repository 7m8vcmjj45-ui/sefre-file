<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stylish App - Tag Function</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff2d75;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --border-color: #333;
            --bar-inactive: #383838;
            --sidebar-bg: #1a1a1a;
        }

        * { touch-action: manipulation; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            height: 100%; height: 100dvh;
            width: 100vw;
            background-color: #000;
            color: var(--text-main);
            overflow: hidden; 
            position: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .phone-container {
            width: 100%; height: 100%; height: 100dvh;
            max-width: 414px; margin: 0 auto;
            background-color: var(--bg-dark);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* ヘッダー */
        .nav-bar {
            height: 60px; display: flex; align-items: center; padding: 0 10px;
            background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); flex-shrink: 0;
            z-index: 10;
        }
        .menu-btn { font-size: 24px; cursor: pointer; padding: 10px; color: var(--text-main); }

        .page-nav { flex: 1; display: flex; align-items: center; justify-content: center; }
        .nav-arrow { background: none; border: none; color: var(--accent-color); font-size: 20px; padding: 10px; cursor: pointer; }
        .page-title-input { width: 110px; background: transparent; border: none; color: var(--text-main); text-align: center; font-size: 16px; font-weight: bold; outline: none; }

        /* 固定上部（画像・パラメータ） */
        .fixed-header {
            display: flex; height: 260px; flex-shrink: 0; border-bottom: 1px solid var(--border-color);
        }
        .image-area {
            width: 60%; background-color: #1a1a1a; display: flex; justify-content: center;
            align-items: center; border-right: 1px solid var(--border-color); cursor: pointer;
        }
        .image-area img { width: 100%; height: 100%; object-fit: cover; }

        /* パラメータエリア */
        .param-area {
            width: 40%; display: flex; flex-direction: column; justify-content: flex-start;
            padding: 15px 5px; background-color: var(--card-bg); align-items: center;
        }

        /* タグボタン */
        .tag-btn {
            margin-bottom: 15px;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 80%;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tag-btn.active {
            background-color: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-color);
        }
        .tag-btn.inactive {
            background-color: #2a2a2a;
            color: #666;
            box-shadow: none;
        }

        .param-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; width: 100%; }
        .param-label { font-size: 11px; color: var(--text-sub); margin-bottom: 5px; font-weight: 600; }
        .btn-ctrl { background: none; border: none; color: var(--text-main); font-size: 20px; padding: 5px 8px; cursor: pointer; }
        
        .indicator-container { display: flex; gap: 3px; }
        .bar { width: 5px; height: 20px; background-color: var(--bar-inactive); border-radius: 2px; }
        .bar.active { background-color: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }

        /* スクロールエリア */
        .scroll-content { flex: 1; overflow-y: auto; padding: 20px; background-color: var(--bg-dark); }
        .memo-textarea { width: 100%; height: 300px; background-color: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 10px; padding: 15px; color: #ccc; font-size: 16px; line-height: 1.5; resize: none; outline: none; }

        /* サイドメニュー */
        .sidebar { position: absolute; top: 0; left: -100%; width: 80%; max-width: 300px; height: 100%; background-color: var(--sidebar-bg); z-index: 100; transition: left 0.3s ease; box-shadow: 10px 0 30px rgba(0,0,0,0.8); padding: 40px 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-header { font-size: 20px; font-weight: bold; color: var(--accent-color); margin-bottom: 20px; }
        .sidebar-item { padding: 15px 0; border-bottom: 1px solid #333; color: #fff; font-size: 16px; cursor: pointer; }
        .setting-input-group { margin-top: 20px; }
        .setting-input-group label { font-size: 11px; color: var(--text-sub); display: block; margin-bottom: 5px; }
        .setting-input-group input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; font-size: 16px; border-radius: 5px; margin-bottom: 10px; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 90; }
        .overlay.show { display: block; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="phone-container" id="mainContainer">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">MENU</div>
        <div id="page-list"></div>
        <div class="sidebar-item" onclick="addNewPage()" style="color: var(--accent-color);">＋ ページを追加</div>
        
        <div class="setting-input-group">
            <label>タグの表示名</label><input type="text" id="set-tag-name" oninput="updateSettings()">
            <label>パラメータ①</label><input type="text" id="set-p1" oninput="updateSettings()">
            <label>パラメータ②</label><input type="text" id="set-p2" oninput="updateSettings()">
            <label>パラメータ③</label><input type="text" id="set-p3" oninput="updateSettings()">
        </div>
        
        <div class="sidebar-item" onclick="toggleMenu()" style="margin-top: 30px; text-align: center; opacity: 0.5;">閉じる</div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="nav-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="page-nav">
            <button class="nav-arrow" onclick="prevPage()">◀</button>
            <input type="text" class="page-title-input" id="pageTitle" oninput="saveCurrentState()">
            <button class="nav-arrow" onclick="nextPage()">▶</button>
        </div>
        <div style="width:40px;"></div>
    </div>

    <div class="fixed-header">
        <div class="image-area" onclick="document.getElementById('fileInput').click()">
            <div id="placeholder" style="color:#444; font-size: 12px;">📷 UPLOAD</div>
            <img id="preview" style="display:none;">
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="param-area">
            <!-- 新設：タグボタン -->
            <button class="tag-btn" id="tagButton" onclick="toggleTag()"></button>

            <div class="param-group">
                <div class="param-label id-p1"></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-ctrl" onclick="changeVal('p1', -1)">◀</button>
                    <div class="indicator-container" id="ind-p1"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <button class="btn-ctrl" onclick="changeVal('p1', 1)">▶</button>
                </div>
            </div>
            <div class="param-group">
                <div class="param-label id-p2"></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-ctrl" onclick="changeVal('p2', -1)">◀</button>
                    <div class="indicator-container" id="ind-p2"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <button class="btn-ctrl" onclick="changeVal('p2', 1)">▶</button>
                </div>
            </div>
            <div class="param-group">
                <div class="param-label id-p3"></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-ctrl" onclick="changeVal('p3', -1)">◀</button>
                    <div class="indicator-container" id="ind-p3"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <button class="btn-ctrl" onclick="changeVal('p3', 1)">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="scroll-content" id="scrollArea">
        <div style="font-size:12px; color:var(--accent-color); margin-bottom:10px; font-weight: bold;">MEMO</div>
        <textarea class="memo-textarea" id="memoField" oninput="saveCurrentState()" placeholder="詳細を入力..."></textarea>
        <div style="height: 120px;"></div>
    </div>
</div>

<script>
    // --- 初期データ構造 ---
    let appData = { 
        currentIndex: 0, 
        tagName: "タグ", // グローバル設定
        paramNames: ["近さ", "固さ", "見た目"], 
        pages: [{ title: "ページ①", img: null, p1: 1, p2: 1, p3: 1, memo: "", tagActive: false }] 
    };

    // --- タグ切り替え ---
    function toggleTag() {
        appData.pages[appData.currentIndex].tagActive = !appData.pages[appData.currentIndex].tagActive;
        updateUI();
        saveToStorage();
    }

    // --- ページ移動 ---
    function nextPage() { appData.currentIndex = (appData.currentIndex + 1) % appData.pages.length; updateUI(); saveToStorage(); }
    function prevPage() { appData.currentIndex = (appData.currentIndex - 1 + appData.pages.length) % appData.pages.length; updateUI(); saveToStorage(); }

    // --- 保存 & 読み込み ---
    function saveToStorage() {
        try { localStorage.setItem('myAppData_vTagFixed', JSON.stringify(appData)); } catch (e) { console.error("Save failed", e); }
    }
    function loadFromStorage() {
        const saved = localStorage.getItem('myAppData_vTagFixed');
        if (saved) { appData = JSON.parse(saved); }
        document.getElementById('set-tag-name').value = appData.tagName;
        document.getElementById('set-p1').value = appData.paramNames[0];
        document.getElementById('set-p2').value = appData.paramNames[1];
        document.getElementById('set-p3').value = appData.paramNames[2];
        updateUI();
    }

    // --- UI更新 ---
    function updateUI() {
        const p = appData.pages[appData.currentIndex];
        document.getElementById('pageTitle').value = p.title;
        document.getElementById('memoField').value = p.memo;
        
        // タグボタン更新
        const tagBtn = document.getElementById('tagButton');
        tagBtn.innerText = appData.tagName;
        if (p.tagActive) {
            tagBtn.classList.remove('inactive');
            tagBtn.classList.add('active');
        } else {
            tagBtn.classList.remove('active');
            tagBtn.classList.add('inactive');
        }

        // パラメータ更新
        ['p1', 'p2', 'p3'].forEach((key, idx) => {
            document.querySelector(`.id-${key}`).innerText = appData.paramNames[idx];
            const bars = document.getElementById(`ind-${key}`).querySelectorAll('.bar');
            bars.forEach((bar, i) => bar.classList.toggle('active', i < p[key]));
        });

        // 画像更新
        const img = document.getElementById('preview'), ph = document.getElementById('placeholder');
        if (p.img) { img.src = p.img; img.style.display = 'block'; ph.style.display = 'none'; }
        else { img.style.display = 'none'; ph.style.display = 'block'; }
    }

    function saveCurrentState() {
        appData.pages[appData.currentIndex].title = document.getElementById('pageTitle').value;
        appData.pages[appData.currentIndex].memo = document.getElementById('memoField').value;
        saveToStorage();
    }

    function updateSettings() {
        appData.tagName = document.getElementById('set-tag-name').value;
        appData.paramNames[0] = document.getElementById('set-p1').value;
        appData.paramNames[1] = document.getElementById('set-p2').value;
        appData.paramNames[2] = document.getElementById('set-p3').value;
        updateUI();
        saveToStorage();
    }

    // --- その他機能 ---
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); renderPageList(); }
    
    function changeVal(key, diff) {
        const next = appData.pages[appData.currentIndex][key] + diff;
        if (next >= 1 && next <= 5) { appData.pages[appData.currentIndex][key] = next; updateUI(); saveToStorage(); }
    }

    function addNewPage() {
        appData.pages.push({ title: `ページ${appData.pages.length + 1}`, img: null, p1: 1, p2: 1, p3: 1, memo: "", tagActive: false });
        appData.currentIndex = appData.pages.length - 1;
        updateUI(); saveToStorage(); toggleMenu();
    }

    function switchPage(idx) { appData.currentIndex = idx; updateUI(); toggleMenu(); }

    function renderPageList() {
        const list = document.getElementById('page-list');
        list.innerHTML = '';
        appData.pages.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.innerText = p.title || `無題 ${i+1}`;
            item.onclick = () => switchPage(i);
            list.appendChild(item);
        });
    }

    // 画像リサイズ
    function resizeImage(file, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500;
                let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (e.target.files[0]) {
            resizeImage(e.target.files[0], (data) => {
                appData.pages[appData.currentIndex].img = data;
                updateUI(); saveToStorage();
            });
        }
    });

    // キーボード対策
    function fixLayout() { window.scrollTo(0, 0); if (window.visualViewport) { document.body.style.height = window.visualViewport.height + 'px'; } }
    if (window.visualViewport) { window.visualViewport.addEventListener('resize', fixLayout); window.visualViewport.addEventListener('scroll', fixLayout); }
    document.addEventListener('focusout', () => { setTimeout(() => { window.scrollTo(0, 0); }, 50); });

    window.onload = loadFromStorage;
</script>

</body>
</html>
