<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPhone 13 Pro Optimized App</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff2d75;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --border-color: #333;
            --bar-inactive: #383838;
            --sidebar-bg: #1a1a1a;
        }

        /* ダブルタップズーム抑制 & Safe Area 考慮 */
        * { touch-action: manipulation; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            height: 100%; height: 100dvh;
            width: 100vw;
            background-color: #000;
            color: var(--text-main);
            overflow: hidden; 
            position: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        }

        .phone-container {
            width: 100%; height: 100%; height: 100dvh;
            max-width: 414px; margin: 0 auto;
            background-color: var(--bg-dark);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            /* iPhoneのノッチと下部バーの余白を自動確保 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ヘッダー */
        .nav-bar {
            height: 50px; display: flex; align-items: center; padding: 0 10px;
            background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); flex-shrink: 0;
            z-index: 10;
        }
        .menu-btn { font-size: 24px; cursor: pointer; padding: 10px; color: var(--text-main); }
        .page-nav { flex: 1; display: flex; align-items: center; justify-content: center; }
        .nav-arrow { background: none; border: none; color: var(--accent-color); font-size: 24px; padding: 5px 15px; cursor: pointer; }
        .page-title-input { width: 120px; background: transparent; border: none; color: var(--text-main); text-align: center; font-size: 16px; font-weight: bold; outline: none; }

        /* 固定上部（画像 & パラメータ） */
        .fixed-header {
            display: flex; height: 230px; flex-shrink: 0; border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease-in-out;
        }
        /* 入力モード：iPhoneのキーボード高さを考慮して大幅に縮小 */
        .phone-container.typing-mode .fixed-header { height: 60px; opacity: 0.1; pointer-events: none; }

        .image-area { width: 62%; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; border-right: 1px solid var(--border-color); position: relative; }
        .image-area img { width: 100%; height: 100%; object-fit: cover; }
        .param-area { width: 38%; display: flex; flex-direction: column; justify-content: center; padding: 5px; background-color: var(--card-bg); align-items: center; }

        .tag-row { display: flex; gap: 4px; width: 92%; margin-bottom: 12px; }
        .tag-btn { flex: 1; height: 30px; border-radius: 8px; font-size: 10px; font-weight: bold; border: none; display: flex; align-items: center; justify-content: center; line-height: 1; }
        .tag-btn.active { background-color: var(--accent-color); color: #000; box-shadow: 0 0 10px var(--accent-color); }
        .tag-btn.inactive { background-color: #2a2a2a; color: #666; }

        .param-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; width: 100%; }
        .param-label { font-size: 10px; color: var(--text-sub); margin-bottom: 4px; font-weight: 600; }
        .btn-ctrl { background: none; border: none; color: var(--text-main); font-size: 24px; padding: 2px 10px; cursor: pointer; }
        .btn-ctrl:active { color: var(--accent-color); transform: scale(1.1); }
        
        .indicator-container { display: flex; gap: 3px; }
        .bar { width: 5px; height: 18px; background-color: var(--bar-inactive); border-radius: 1px; }
        .bar.active { background-color: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }

        /* メモスワイプエリア */
        .memo-swipe-outer { flex: 1; display: flex; flex-direction: column; overflow: hidden; background-color: var(--bg-dark); }
        .memo-dots { height: 15px; display: flex; justify-content: center; align-items: center; gap: 5px; margin-top: 5px; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: #333; transition: 0.3s; }
        .dot.active { background: var(--accent-color); transform: scale(1.4); }

        .memo-swipe-container { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .memo-swipe-container::-webkit-scrollbar { display: none; }

        .memo-card-wrapper { flex: 0 0 100%; width: 100%; height: 100%; scroll-snap-align: start; padding: 10px 15px 30px 15px; display: flex; flex-direction: column; }
        
        /* メモカードの枠（画面サイズに合わせて伸縮） */
        .memo-frame {
            flex: 1; max-height: 380px; 
            background-color: rgba(255,255,255,0.03);
            border: 1.5px solid var(--border-color); border-radius: 16px;
            display: flex; flex-direction: column; padding: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .memo-card-header { font-size: 10px; color: var(--accent-color); margin-bottom: 8px; letter-spacing: 2px; font-weight: bold; }
        .memo-textarea {
            width: 100%; height: 100%; background: transparent; border: none;
            color: #ddd; font-size: 16px; line-height: 1.6; resize: none; outline: none;
            overflow: hidden; /* 縦スクロール禁止 */
        }

        /* サイドメニュー */
        .sidebar { position: absolute; top: 0; left: -100%; width: 80%; max-width: 300px; height: 100%; background-color: var(--sidebar-bg); z-index: 100; transition: left 0.3s ease; padding: 60px 20px 20px 20px; }
        .sidebar.open { left: 0; }
        .sidebar-item { padding: 12px 0; border-bottom: 1px solid #333; color: #fff; font-size: 15px; cursor: pointer; }
        .setting-input-group { margin-top: 15px; }
        .setting-input-group label { font-size: 10px; color: var(--text-sub); display: block; margin-bottom: 4px; }
        .setting-input-group input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; font-size: 16px; border-radius: 8px; margin-bottom: 12px; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 90; }
        .overlay.show { display: block; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="phone-container" id="mainContainer">
    <div class="sidebar" id="sidebar">
        <div style="font-weight: bold; color: var(--accent-color); font-size: 18px; margin-bottom: 20px;">MENU</div>
        <div id="sidebar-page-list"></div>
        <div class="sidebar-item" onclick="addNewDataPage()" style="color: var(--accent-color);">＋ ページを追加</div>
        <div class="setting-input-group">
            <label>タグ名1</label><input type="text" id="set-tag-name1" oninput="updateSettings()">
            <label>タグ名2</label><input type="text" id="set-tag-name2" oninput="updateSettings()">
        </div>
        <div class="sidebar-item" onclick="toggleMenu()" style="margin-top: 40px; text-align: center; opacity: 0.5; font-size: 12px;">閉じる</div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="nav-bar">
        <div onclick="toggleMenu()" style="font-size:24px; padding:10px;">☰</div>
        <div class="page-nav">
            <button class="nav-arrow" onclick="changeDataPage(-1)">◀</button>
            <input type="text" class="page-title-input" id="pageTitle" oninput="saveCurrentState()">
            <button class="nav-arrow" onclick="changeDataPage(1)">▶</button>
        </div>
        <div style="width:44px;"></div>
    </div>

    <div class="fixed-header" id="fixedHeader">
        <div class="image-area" onclick="document.getElementById('fileInput').click()">
            <div id="placeholder" style="color:#444; font-size: 10px;">📷 UPLOAD</div>
            <img id="preview" style="display:none;">
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="param-area">
            <div class="tag-row">
                <button class="tag-btn" id="tagButton1" onclick="toggleTag(1)"></button>
                <button class="tag-btn" id="tagButton2" onclick="toggleTag(2)"></button>
            </div>
            <div id="params-render" style="width: 100%;"></div>
        </div>
    </div>

    <div class="memo-swipe-outer">
        <div class="memo-dots" id="memoDots"></div>
        <div class="memo-swipe-container" id="memoSwipeContainer"></div>
    </div>
</div>

<script>
    let appData = {
        currentIndex: 0,
        tagName1: "TAG 1", tagName2: "TAG 2",
        paramNames: ["近さ", "固さ", "見た目"],
        pages: [{
            title: "PAGE 1", img: null, p1: 1, p2: 1, p3: 1,
            tagActive1: false, tagActive2: false,
            memos: [{ content: "", isNew: false }]
        }]
    };

    const swipeContainer = document.getElementById('memoSwipeContainer');
    const mainContainer = document.getElementById('mainContainer');

    // ページ切り替え
    function changeDataPage(dir) {
        let next = appData.currentIndex + dir;
        if (next < 0) next = appData.pages.length - 1;
        if (next >= appData.pages.length) next = 0;
        appData.currentIndex = next;
        renderAll();
        saveToStorage();
    }

    function addNewDataPage() {
        appData.pages.push({
            title: `PAGE ${appData.pages.length + 1}`, img: null, p1: 1, p2: 1, p3: 1,
            tagActive1: false, tagActive2: false,
            memos: [{ content: "", isNew: false }]
        });
        appData.currentIndex = appData.pages.length - 1;
        renderAll(); toggleMenu(); saveToStorage();
    }

    // メモスワイプ監視
    swipeContainer.addEventListener('scroll', () => {
        const index = Math.round(swipeContainer.scrollLeft / swipeContainer.clientWidth);
        const p = appData.pages[appData.currentIndex];
        
        if (index !== p.currentMemoIndex) {
            const oldIdx = p.currentMemoIndex || 0;
            p.currentMemoIndex = index;
            updateDots(index);

            const oldMemo = p.memos[oldIdx];
            if (oldMemo && oldMemo.isNew && oldMemo.content.trim() === "") {
                p.memos.splice(oldIdx, 1);
                p.currentMemoIndex = Math.min(index, p.memos.length - 1);
                renderMemosOnly();
            }

            if (index >= p.memos.length) {
                p.memos.push({ content: "", isNew: true });
                renderMemosOnly();
            }
        }
    });

    function renderMemosOnly() {
        const p = appData.pages[appData.currentIndex];
        swipeContainer.innerHTML = '';
        p.memos.forEach((m, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'memo-card-wrapper';
            wrapper.innerHTML = `
                <div class="memo-frame">
                    <div class="memo-card-header">CARD ${i+1}</div>
                    <textarea class="memo-textarea" 
                        onfocus="setTyping(true)" 
                        onblur="setTyping(false)" 
                        oninput="updateMemoContent(this, ${i})"
                        placeholder="Type here...">${m.content}</textarea>
                </div>
            `;
            swipeContainer.appendChild(wrapper);
        });
        updateDots(p.currentMemoIndex || 0);
        swipeContainer.scrollLeft = (p.currentMemoIndex || 0) * swipeContainer.clientWidth;
    }

    function updateDots(activeIdx) {
        const p = appData.pages[appData.currentIndex];
        const dots = document.getElementById('memoDots');
        dots.innerHTML = '';
        p.memos.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = i === activeIdx ? 'dot active' : 'dot';
            dots.appendChild(dot);
        });
    }

    function updateMemoContent(el, memoIdx) {
        // 固定枠からはみ出る入力をブロック
        if (el.scrollHeight > el.clientHeight) {
            el.value = appData.pages[appData.currentIndex].memos[memoIdx].content;
            return;
        }
        const p = appData.pages[appData.currentIndex];
        p.memos[memoIdx].content = el.value;
        p.memos[memoIdx].isNew = false;
        saveToStorage();
    }

    function renderAll() {
        const p = appData.pages[appData.currentIndex];
        document.getElementById('pageTitle').value = p.title;
        document.getElementById('tagButton1').innerText = appData.tagName1;
        document.getElementById('tagButton1').className = p.tagActive1 ? 'tag-btn active' : 'tag-btn inactive';
        document.getElementById('tagButton2').innerText = appData.tagName2;
        document.getElementById('tagButton2').className = p.tagActive2 ? 'tag-btn active' : 'tag-btn inactive';
        
        const paramBox = document.getElementById('params-render');
        paramBox.innerHTML = '';
        ['p1', 'p2', 'p3'].forEach((key, idx) => {
            const val = p[key];
            paramBox.innerHTML += `
                <div class="param-group">
                    <div class="param-label">${appData.paramNames[idx]}</div>
                    <div style="display:flex; align-items:center;">
                        <button class="btn-ctrl" onclick="changeVal('${key}', -1)">◀</button>
                        <div class="indicator-container">
                            ${[1,2,3,4,5].map(i => `<div class="bar ${i <= val ? 'active' : ''}"></div>`).join('')}
                        </div>
                        <button class="btn-ctrl" onclick="changeVal('${key}', 1)">▶</button>
                    </div>
                </div>
            `;
        });

        const img = document.getElementById('preview'), ph = document.getElementById('placeholder');
        if (p.img) { img.src = p.img; img.style.display = 'block'; ph.style.display = 'none'; }
        else { img.style.display = 'none'; ph.style.display = 'block'; }
        renderMemosOnly();
    }

    function setTyping(isTyping) {
        if (isTyping) mainContainer.classList.add('typing-mode');
        else { mainContainer.classList.remove('typing-mode'); window.scrollTo(0,0); }
    }

    function changeVal(key, diff) {
        const p = appData.pages[appData.currentIndex];
        const next = p[key] + diff;
        if (next >= 1 && next <= 5) { p[key] = next; renderAll(); saveToStorage(); }
    }

    function toggleTag(num) {
        const p = appData.pages[appData.currentIndex];
        if (num === 1) p.tagActive1 = !p.tagActive1;
        else p.tagActive2 = !p.tagActive2;
        renderAll(); saveToStorage();
    }

    function saveCurrentState() {
        appData.pages[appData.currentIndex].title = document.getElementById('pageTitle').value;
        saveToStorage();
    }

    function updateSettings() {
        appData.tagName1 = document.getElementById('set-tag-name1').value;
        appData.tagName2 = document.getElementById('set-tag-name2').value;
        renderAll(); saveToStorage();
    }

    function saveToStorage() { localStorage.setItem('myAppData_viPhone13', JSON.stringify(appData)); }
    function loadFromStorage() {
        const saved = localStorage.getItem('myAppData_viPhone13');
        if (saved) { appData = JSON.parse(saved); }
        renderAll();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
        const list = document.getElementById('sidebar-page-list');
        list.innerHTML = '';
        appData.pages.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.innerText = p.title;
            item.onclick = () => { appData.currentIndex = i; renderAll(); toggleMenu(); };
            list.appendChild(item);
        });
    }

    function resizeImage(file, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500;
                let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (e.target.files[0]) {
            resizeImage(e.target.files[0], (data) => {
                appData.pages[appData.currentIndex].img = data;
                renderAll(); saveToStorage();
            });
        }
    });

    window.onload = loadFromStorage;
</script>

</body>
</html>
