<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Parameter UI</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00e5ff; /* スタイリッシュなシアン */
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --border-color: #333;
            --bar-inactive: #444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        /* スマホ外枠 */
        .phone-container {
            width: 375px;
            height: 750px;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            border: 10px solid #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* 上部セクション */
        .top-section {
            display: flex;
            height: 300px;
            border-bottom: 1px solid var(--border-color);
        }

        /* 画像エリア (2/3) */
        .image-area {
            width: 66.6%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid var(--border-color);
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        .image-area:hover {
            background-color: #252525;
        }
        .image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-icon {
            font-size: 24px;
            color: var(--text-sub);
            text-align: center;
        }
        .upload-icon span {
            font-size: 10px;
            display: block;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* パラメータエリア (1/3) */
        .param-area {
            width: 33.3%;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            background-color: var(--card-bg);
        }

        .param-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .param-label {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--text-sub);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ◀︎ ▶︎ ボタン */
        .btn-ctrl {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 12px;
            cursor: pointer;
            padding: 5px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .btn-ctrl:active {
            opacity: 1;
            color: var(--accent-color);
        }

        /* 5つの縦長長方形が横に並ぶインジケーター */
        .indicator-container {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .bar {
            width: 4px;
            height: 18px;
            background-color: var(--bar-inactive);
            border-radius: 1px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .bar.active {
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        /* 下部エリア（メモ欄） */
        .bottom-section {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-dark);
        }

        .memo-header {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-weight: bold;
        }

        .memo-textarea {
            flex: 1;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            color: #ddd;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }
        .memo-textarea:focus {
            border-color: var(--accent-color);
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="top-section">
        <!-- 画像エリア -->
        <div class="image-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon" id="placeholder">
                ＋<br><span>IMAGE</span>
            </div>
            <img id="preview" style="display:none;">
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <!-- パラメータエリア -->
        <div class="param-area">
            <!-- 近さ -->
            <div class="param-group">
                <div class="param-label">近さ</div>
                <div class="control-row">
                    <button class="btn-ctrl" onclick="changeVal('near', -1)">◀</button>
                    <div class="indicator-container" id="ind-near">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                    <button class="btn-ctrl" onclick="changeVal('near', 1)">▶</button>
                </div>
            </div>

            <!-- 固さ -->
            <div class="param-group">
                <div class="param-label">固さ</div>
                <div class="control-row">
                    <button class="btn-ctrl" onclick="changeVal('hard', -1)">◀</button>
                    <div class="indicator-container" id="ind-hard">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                    <button class="btn-ctrl" onclick="changeVal('hard', 1)">▶</button>
                </div>
            </div>

            <!-- 見た目 -->
            <div class="param-group">
                <div class="param-label">見た目</div>
                <div class="control-row">
                    <button class="btn-ctrl" onclick="changeVal('look', -1)">◀</button>
                    <div class="indicator-container" id="ind-look">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                    <button class="btn-ctrl" onclick="changeVal('look', 1)">▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 下部：メモ欄 -->
    <div class="bottom-section">
        <div class="memo-header">Notes</div>
        <textarea class="memo-textarea" placeholder="Type something here..."></textarea>
    </div>
</div>

<script>
    const data = {
        near: 1,
        hard: 1,
        look: 1
    };

    function changeVal(id, diff) {
        const next = data[id] + diff;
        if (next >= 1 && next <= 5) {
            data[id] = next;
            updateUI();
        }
    }

    function updateUI() {
        Object.keys(data).forEach(key => {
            const container = document.getElementById(`ind-${key}`);
            const bars = container.querySelectorAll('.bar');
            bars.forEach((bar, index) => {
                if (index < data[key]) {
                    bar.classList.add('active');
                } else {
                    bar.classList.remove('active');
                }
            });
        });
    }

    // 画像プレビュー
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.getElementById('preview');
                img.src = event.target.result;
                img.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });

    // 初回実行
    updateUI();
</script>

</body>
</html>
