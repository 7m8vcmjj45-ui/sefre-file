<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stylish Pink UI</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff2d75; /* スタイリッシュなピンクに変更 */
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --border-color: #333;
            --bar-inactive: #444;
            --sidebar-bg: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* スマホ外枠 */
        .phone-container {
            width: 375px;
            height: 750px;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            border: 10px solid #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* ヘッダーナビ */
        .nav-bar {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            width: 30px;
        }

        .page-title-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            outline: none;
            letter-spacing: 1px;
        }
        .page-title-input:focus {
            color: var(--accent-color);
        }

        /* 上部固定エリア */
        .fixed-header {
            display: flex;
            height: 240px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .image-area {
            width: 66.6%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid var(--border-color);
            position: relative;
            cursor: pointer;
        }
        .image-area img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .param-area {
            width: 33.3%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px 0;
            background-color: var(--card-bg);
        }

        .param-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .param-label {
            font-size: 10px;
            color: var(--text-sub);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-ctrl {
            background: none; border: none; color: var(--text-main);
            font-size: 10px; cursor: pointer; opacity: 0.6;
        }
        .btn-ctrl:active { color: var(--accent-color); opacity: 1; }

        .indicator-container { display: flex; gap: 2px; }
        .bar {
            width: 3px; height: 12px;
            background-color: var(--bar-inactive);
            border-radius: 1px;
            transition: all 0.2s;
        }
        .bar.active {
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color); /* ピンクに発光 */
        }

        /* 下部スクロールエリア */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: var(--bg-dark);
        }

        .memo-label {
            font-size: 12px; color: var(--accent-color);
            margin-bottom: 10px; letter-spacing: 1px;
        }

        .memo-textarea {
            width: 100%; height: 400px;
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }
        .memo-textarea:focus { border-color: var(--accent-color); }

        /* サイドメニュー */
        .sidebar {
            position: absolute;
            top: 0; left: -100%;
            width: 280px; height: 100%;
            background-color: var(--sidebar-bg);
            z-index: 100;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .sidebar.open { left: 0; }

        .sidebar-item {
            padding: 15px 0;
            border-bottom: 1px solid #333;
            cursor: pointer;
            color: var(--text-main);
            font-size: 14px;
        }
        .sidebar-item:hover { color: var(--accent-color); }

        .setting-input-group { margin-bottom: 10px; }
        .setting-input-group label { font-size: 10px; display: block; color: var(--text-sub); }
        .setting-input-group input {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 5px; width: 100%; box-sizing: border-box; border-radius: 4px;
        }
        .setting-input-group input:focus { border-color: var(--accent-color); outline: none; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; z-index: 90;
        }
        .overlay.show { display: block; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="sidebar" id="sidebar">
        <div style="font-weight: bold; font-size: 18px; margin-bottom: 30px; color: var(--accent-color);">MENU</div>
        <div style="font-size: 12px; color: var(--text-sub); margin-top: 30px; margin-bottom: 10px; text-transform: uppercase;">Pages</div>
        <div id="page-list"></div>
        <div class="sidebar-item" onclick="addNewPage()" style="color: var(--accent-color); font-weight: bold;">＋ ページを追加</div>

        <div style="font-size: 12px; color: var(--text-sub); margin-top: 30px; margin-bottom: 10px; text-transform: uppercase;">Settings</div>
        <div class="setting-input-group">
            <label>パラメータ①</label>
            <input type="text" id="set-p1" oninput="updateParamNames()" value="近さ">
        </div>
        <div class="setting-input-group">
            <label>パラメータ②</label>
            <input type="text" id="set-p2" oninput="updateParamNames()" value="固さ">
        </div>
        <div class="setting-input-group">
            <label>パラメータ③</label>
            <input type="text" id="set-p3" oninput="updateParamNames()" value="見た目">
        </div>
        <div class="sidebar-item" onclick="toggleMenu()" style="margin-top: 40px; opacity: 0.5;">閉じる</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="nav-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <input type="text" class="page-title-input" id="pageTitle" oninput="saveCurrentPage()" value="ページ①">
        <div style="width:30px;"></div>
    </div>

    <div class="fixed-header">
        <div class="image-area" onclick="document.getElementById('fileInput').click()">
            <div id="placeholder" style="color: #444; text-align:center;">📷<br><span style="font-size:10px;">UPLOAD</span></div>
            <img id="preview" style="display:none;">
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="param-area">
            <div class="param-group">
                <div class="param-label id-p1">近さ</div>
                <div class="control-row">
                    <button class="btn-ctrl" onclick="changeVal('p1', -1)">◀</button>
                    <div class="indicator-container" id="ind-p1">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                    <button class="btn-ctrl" onclick="changeVal('p1', 1)">▶</button>
                </div>
            </div>
            <div class="param-group">
                <div class="param-label id-p2">固さ</div>
                <div class="control-row">
                    <button class="btn-ctrl" onclick="changeVal('p2', -1)">◀</button>
                    <div class="indicator-container" id="ind-p2">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                    <button class="btn-ctrl" onclick="changeVal('p2', 1)">▶</button>
                </div>
            </div>
            <div class="param-group">
                <div class="param-label id-p3">見た目</div>
                <div class="control-row">
                    <button class="btn-ctrl" onclick="changeVal('p3', -1)">◀</button>
                    <div class="indicator-container" id="ind-p3">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                    <button class="btn-ctrl" onclick="changeVal('p3', 1)">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="scroll-content">
        <div class="memo-label">MEMO</div>
        <textarea class="memo-textarea" id="memoField" oninput="saveCurrentPage()" placeholder="メモを入力..."></textarea>
    </div>
</div>

<script>
    let pages = [{ title: "ページ①", img: null, p1: 1, p2: 1, p3: 1, memo: "" }];
    let currentIndex = 0;
    let paramNames = ["近さ", "固さ", "見た目"];

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
        renderPageList();
    }

    function updateParamNames() {
        paramNames[0] = document.getElementById('set-p1').value;
        paramNames[1] = document.getElementById('set-p2').value;
        paramNames[2] = document.getElementById('set-p3').value;
        document.querySelector('.id-p1').innerText = paramNames[0];
        document.querySelector('.id-p2').innerText = paramNames[1];
        document.querySelector('.id-p3').innerText = paramNames[2];
    }

    function changeVal(key, diff) {
        const next = pages[currentIndex][key] + diff;
        if (next >= 1 && next <= 5) {
            pages[currentIndex][key] = next;
            updateUI();
        }
    }

    function updateUI() {
        const p = pages[currentIndex];
        document.getElementById('pageTitle').value = p.title;
        document.getElementById('memoField').value = p.memo;
        ['p1', 'p2', 'p3'].forEach(key => {
            const bars = document.getElementById(`ind-${key}`).querySelectorAll('.bar');
            bars.forEach((bar, i) => { bar.classList.toggle('active', i < p[key]); });
        });
        const img = document.getElementById('preview');
        const ph = document.getElementById('placeholder');
        if (p.img) { img.src = p.img; img.style.display = 'block'; ph.style.display = 'none'; }
        else { img.style.display = 'none'; ph.style.display = 'block'; }
    }

    function saveCurrentPage() {
        pages[currentIndex].title = document.getElementById('pageTitle').value;
        pages[currentIndex].memo = document.getElementById('memoField').value;
    }

    function addNewPage() {
        pages.push({ title: `ページ${pages.length + 1}`, img: null, p1: 1, p2: 1, p3: 1, memo: "" });
        currentIndex = pages.length - 1;
        updateUI();
        toggleMenu();
    }

    function switchPage(idx) {
        currentIndex = idx;
        updateUI();
        toggleMenu();
    }

    function renderPageList() {
        const list = document.getElementById('page-list');
        list.innerHTML = '';
        pages.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.innerText = p.title || `無題 ${i+1}`;
            item.onclick = () => switchPage(i);
            list.appendChild(item);
        });
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { pages[currentIndex].img = ev.target.result; updateUI(); };
            reader.readAsDataURL(file);
        }
    });

    updateUI();
    updateParamNames();
</script>

</body>
</html>
