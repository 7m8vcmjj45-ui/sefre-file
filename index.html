<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stylish Swipe App</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff2d75;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --border-color: #333;
            --bar-inactive: #383838;
            --sidebar-bg: #1a1a1a;
        }

        * { touch-action: manipulation; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; height: 100%; height: 100dvh; width: 100vw;
            background-color: #000; color: var(--text-main); overflow: hidden; 
            position: fixed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .phone-container {
            width: 100%; height: 100%; height: 100dvh; max-width: 414px; margin: 0 auto;
            background-color: var(--bg-dark); display: flex; flex-direction: column;
            position: relative; overflow: hidden; transition: all 0.3s ease;
        }

        /* ヘッダー */
        .nav-bar {
            height: 60px; display: flex; align-items: center; padding: 0 10px;
            background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); flex-shrink: 0; z-index: 10;
        }
        .menu-btn { font-size: 24px; cursor: pointer; padding: 10px; color: var(--text-main); }
        .page-nav { flex: 1; display: flex; align-items: center; justify-content: center; }
        .nav-arrow { background: none; border: none; color: var(--accent-color); font-size: 20px; padding: 10px; cursor: pointer; }
        .page-title-input { width: 110px; background: transparent; border: none; color: var(--text-main); text-align: center; font-size: 16px; font-weight: bold; outline: none; }

        /* 固定上部（入力中は少し縮小） */
        .fixed-header {
            display: flex; height: 260px; flex-shrink: 0; border-bottom: 1px solid var(--border-color);
            transition: height 0.3s ease;
        }
        /* 入力中モード（キーボード対策） */
        .phone-container.typing-mode .fixed-header { height: 120px; }
        .phone-container.typing-mode .param-label { display: none; }
        .phone-container.typing-mode .tag-row { display: none; }

        .image-area { width: 60%; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; border-right: 1px solid var(--border-color); cursor: pointer; position: relative; }
        .image-area img { width: 100%; height: 100%; object-fit: cover; }
        .param-area { width: 40%; display: flex; flex-direction: column; justify-content: center; padding: 5px; background-color: var(--card-bg); align-items: center; }

        .tag-row { display: flex; gap: 4px; width: 95%; margin-bottom: 10px; }
        .tag-btn { flex: 1; height: 30px; border-radius: 8px; font-size: 10px; font-weight: bold; border: none; display: flex; align-items: center; justify-content: center; }
        .tag-btn.active { background-color: var(--accent-color); color: #000; box-shadow: 0 0 10px var(--accent-color); }
        .tag-btn.inactive { background-color: #2a2a2a; color: #666; }

        .param-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; width: 100%; }
        .param-label { font-size: 10px; color: var(--text-sub); margin-bottom: 2px; }
        .indicator-container { display: flex; gap: 3px; }
        .bar { width: 5px; height: 18px; background-color: var(--bar-inactive); border-radius: 2px; }
        .bar.active { background-color: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }
        .btn-ctrl { background: none; border: none; color: var(--text-main); font-size: 18px; padding: 2px 8px; }

        /* スワイプメモエリア */
        .swipe-container {
            flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            background-color: var(--bg-dark); -webkit-overflow-scrolling: touch;
        }
        .swipe-container::-webkit-scrollbar { display: none; }

        .page-wrapper {
            flex: 0 0 100%; width: 100%; height: 100%; scroll-snap-align: start;
            padding: 20px; display: flex; flex-direction: column;
        }
        .memo-label { font-size: 12px; color: var(--accent-color); margin-bottom: 10px; font-weight: bold; }
        .memo-textarea {
            width: 100%; flex: 1; background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color); border-radius: 10px; padding: 15px;
            color: #ccc; font-size: 16px; line-height: 1.5; resize: none; outline: none;
            margin-bottom: 300px; /* キーボード対策の広大な余白 */
        }

        /* サイドメニュー */
        .sidebar { position: absolute; top: 0; left: -100%; width: 80%; max-width: 300px; height: 100%; background-color: var(--sidebar-bg); z-index: 100; transition: left 0.3s ease; padding: 40px 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-header { font-size: 20px; font-weight: bold; color: var(--accent-color); margin-bottom: 20px; }
        .sidebar-item { padding: 12px 0; border-bottom: 1px solid #333; color: #fff; font-size: 15px; cursor: pointer; }
        .setting-input-group { margin-top: 15px; }
        .setting-input-group label { font-size: 10px; color: var(--text-sub); display: block; margin-bottom: 3px; }
        .setting-input-group input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 8px; font-size: 16px; border-radius: 5px; margin-bottom: 8px; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 90; }
        .overlay.show { display: block; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="phone-container" id="mainContainer">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">MENU</div>
        <div id="sidebar-page-list"></div>
        <div class="sidebar-item" onclick="addNewPage()" style="color: var(--accent-color);">＋ ページを追加</div>
        <div class="setting-input-group">
            <label>タグ①名</label><input type="text" id="set-tag-name1" oninput="updateSettings()">
            <label>タグ②名</label><input type="text" id="set-tag-name2" oninput="updateSettings()">
            <label>P1名</label><input type="text" id="set-p1" oninput="updateSettings()">
            <label>P2名</label><input type="text" id="set-p2" oninput="updateSettings()">
            <label>P3名</label><input type="text" id="set-p3" oninput="updateSettings()">
        </div>
        <div class="sidebar-item" onclick="toggleMenu()" style="margin-top: 30px; text-align: center; opacity: 0.5;">閉じる</div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="nav-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="page-nav">
            <button class="nav-arrow" onclick="scrollPage(-1)">◀</button>
            <input type="text" class="page-title-input" id="pageTitle" oninput="saveCurrentState()">
            <button class="nav-arrow" onclick="scrollPage(1)">▶</button>
        </div>
        <div style="width:40px;"></div>
    </div>

    <div class="fixed-header">
        <div class="image-area" onclick="document.getElementById('fileInput').click()">
            <div id="placeholder" style="color:#444; font-size: 10px;">📷 UPLOAD</div>
            <img id="preview" style="display:none;">
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="param-area">
            <div class="tag-row">
                <button class="tag-btn" id="tagButton1" onclick="toggleTag(1)"></button>
                <button class="tag-btn" id="tagButton2" onclick="toggleTag(2)"></button>
            </div>
            <div class="param-group">
                <div class="param-label id-p1"></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-ctrl" onclick="changeVal('p1', -1)">◀</button>
                    <div class="indicator-container" id="ind-p1"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <button class="btn-ctrl" onclick="changeVal('p1', 1)">▶</button>
                </div>
            </div>
            <div class="param-group">
                <div class="param-label id-p2"></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-ctrl" onclick="changeVal('p2', -1)">◀</button>
                    <div class="indicator-container" id="ind-p2"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <button class="btn-ctrl" onclick="changeVal('p2', 1)">▶</button>
                </div>
            </div>
            <div class="param-group">
                <div class="param-label id-p3"></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-ctrl" onclick="changeVal('p3', -1)">◀</button>
                    <div class="indicator-container" id="ind-p3"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <button class="btn-ctrl" onclick="changeVal('p3', 1)">▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- スワイプ可能なメモコンテナ -->
    <div class="swipe-container" id="swipeContainer">
        <!-- JSでページが生成されます -->
    </div>
</div>

<script>
    let appData = { 
        currentIndex: 0, 
        tagName1: "タグ1", tagName2: "タグ2", 
        paramNames: ["近さ", "固さ", "見た目"], 
        pages: [{ title: "ページ①", img: null, p1: 1, p2: 1, p3: 1, memo: "", tagActive1: false, tagActive2: false, isNew: false }] 
    };

    const swipeContainer = document.getElementById('swipeContainer');
    const mainContainer = document.getElementById('mainContainer');

    // --- スワイプ管理 ---
    swipeContainer.addEventListener('scroll', () => {
        const index = Math.round(swipeContainer.scrollLeft / window.innerWidth);
        if (index !== appData.currentIndex) {
            checkAndCleanupEmptyPage(appData.currentIndex); // 前のページが空なら消す
            appData.currentIndex = index;
            
            // 最後のページを超えてスワイプしようとしたら新規作成
            if (appData.currentIndex >= appData.pages.length) {
                addNewPage(true);
            } else {
                updateTopUI();
            }
        }
    });

    function scrollPage(dir) {
        let target = appData.currentIndex + dir;
        if (target < 0) target = 0;
        if (target >= appData.pages.length) {
            addNewPage(true);
        } else {
            swipeContainer.scrollTo({ left: target * window.innerWidth, behavior: 'smooth' });
        }
    }

    // --- ページ管理 ---
    function addNewPage(fromSwipe = false) {
        const newIdx = appData.pages.length + 1;
        appData.pages.push({ 
            title: `ページ${newIdx}`, img: null, p1: 1, p2: 1, p3: 1, memo: "", 
            tagActive1: false, tagActive2: false, isNew: true 
        });
        renderMemoPages();
        if (fromSwipe) {
            swipeContainer.scrollTo({ left: (appData.pages.length - 1) * window.innerWidth, behavior: 'smooth' });
        }
        saveToStorage();
    }

    function checkAndCleanupEmptyPage(prevIdx) {
        const p = appData.pages[prevIdx];
        // 「新規ページ」かつ「タイトルがデフォルト」かつ「メモが空」かつ「画像もパラメータも初期」なら削除
        if (p && p.isNew && p.memo.trim() === "" && !p.img && p.p1 === 1 && p.p2 === 1 && p.p3 === 1) {
            appData.pages.splice(prevIdx, 1);
            if (appData.currentIndex >= appData.pages.length) appData.currentIndex = appData.pages.length - 1;
            renderMemoPages();
            saveToStorage();
        }
    }

    // --- UI更新 ---
    function renderMemoPages() {
        swipeContainer.innerHTML = '';
        appData.pages.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'page-wrapper';
            div.innerHTML = `
                <div class="memo-label">MEMO PAGE ${i+1}</div>
                <textarea class="memo-textarea" placeholder="詳細を入力..." onfocus="setTyping(true)" onblur="setTyping(false)" oninput="updateMemoContent(this, ${i})">${p.memo}</textarea>
            `;
            swipeContainer.appendChild(div);
        });
        updateTopUI();
    }

    function updateTopUI() {
        const p = appData.pages[appData.currentIndex];
        if (!p) return;
        document.getElementById('pageTitle').value = p.title;
        document.getElementById('tagButton1').innerText = appData.tagName1;
        document.getElementById('tagButton1').className = p.tagActive1 ? 'tag-btn active' : 'tag-btn inactive';
        document.getElementById('tagButton2').innerText = appData.tagName2;
        document.getElementById('tagButton2').className = p.tagActive2 ? 'tag-btn active' : 'tag-btn inactive';
        ['p1', 'p2', 'p3'].forEach((key, idx) => {
            document.querySelector(`.id-${key}`).innerText = appData.paramNames[idx];
            const bars = document.getElementById(`ind-${key}`).querySelectorAll('.bar');
            bars.forEach((bar, i) => bar.classList.toggle('active', i < p[key]));
        });
        const img = document.getElementById('preview'), ph = document.getElementById('placeholder');
        if (p.img) { img.src = p.img; img.style.display = 'block'; ph.style.display = 'none'; }
        else { img.style.display = 'none'; ph.style.display = 'block'; }
    }

    function updateMemoContent(el, idx) {
        appData.pages[idx].memo = el.value;
        appData.pages[idx].isNew = false; // 入力されたら「新規フラグ」を下ろす
        saveToStorage();
    }

    function saveCurrentState() {
        appData.pages[appData.currentIndex].title = document.getElementById('pageTitle').value;
        appData.pages[appData.currentIndex].isNew = false;
        saveToStorage();
    }

    function setTyping(isTyping) {
        if (isTyping) {
            mainContainer.classList.add('typing-mode');
        } else {
            mainContainer.classList.remove('typing-mode');
            window.scrollTo(0,0);
        }
    }

    // --- 基本ロジック ---
    function changeVal(key, diff) {
        const p = appData.pages[appData.currentIndex];
        const next = p[key] + diff;
        if (next >= 1 && next <= 5) { p[key] = next; p.isNew = false; updateTopUI(); saveToStorage(); }
    }
    function toggleTag(num) {
        const p = appData.pages[appData.currentIndex];
        if (num === 1) p.tagActive1 = !p.tagActive1;
        if (num === 2) p.tagActive2 = !p.tagActive2;
        p.isNew = false; updateTopUI(); saveToStorage();
    }
    function updateSettings() {
        appData.tagName1 = document.getElementById('set-tag-name1').value;
        appData.tagName2 = document.getElementById('set-tag-name2').value;
        appData.paramNames = [document.getElementById('set-p1').value, document.getElementById('set-p2').value, document.getElementById('set-p3').value];
        updateTopUI(); saveToStorage();
    }

    function saveToStorage() { localStorage.setItem('myAppData_vSwipe', JSON.stringify(appData)); }
    function loadFromStorage() {
        const saved = localStorage.getItem('myAppData_vSwipe');
        if (saved) { appData = JSON.parse(saved); }
        document.getElementById('set-tag-name1').value = appData.tagName1;
        document.getElementById('set-tag-name2').value = appData.tagName2;
        document.getElementById('set-p1').value = appData.paramNames[0];
        document.getElementById('set-p2').value = appData.paramNames[1];
        document.getElementById('set-p3').value = appData.paramNames[2];
        renderMemoPages();
    }

    // 画像処理
    function resizeImage(file, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500;
                let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (e.target.files[0]) {
            resizeImage(e.target.files[0], (data) => {
                appData.pages[appData.currentIndex].img = data;
                appData.pages[appData.currentIndex].isNew = false;
                updateTopUI(); saveToStorage();
            });
        }
    });

    function toggleMenu() { 
        document.getElementById('sidebar').classList.toggle('open'); 
        document.getElementById('overlay').classList.toggle('show'); 
        const list = document.getElementById('sidebar-page-list');
        list.innerHTML = '';
        appData.pages.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.innerText = p.title;
            item.onclick = () => { 
                swipeContainer.scrollTo({ left: i * window.innerWidth, behavior: 'smooth' });
                toggleMenu();
            };
            list.appendChild(item);
        });
    }

    window.onload = loadFromStorage;
</script>

</body>
</html>
