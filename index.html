<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seductive UI Prototype</title>
    <!-- エレガントなフォントの読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Noto+Sans+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0408; /* わずかに紫を含んだ漆黒 */
            --card-bg: rgba(28, 12, 20, 0.8); 
            --accent-pink: #ff0055; /* 艶やかなピンク */
            --accent-gold: #d4af37; /* 上品なゴールド */
            --text-main: #f5f5f5;
            --text-sub: #b08d9b; /* 紫がかったサブテキスト */
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
        }

        * { touch-action: manipulation; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            height: 100%; height: 100dvh;
            width: 100vw;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            position: fixed;
            font-family: 'Noto Sans JP', sans-serif;
        }

        /* 全体に薄いグラデーションを重ねる */
        body::before {
            content: "";
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(255, 0, 85, 0.1), transparent 40%);
            pointer-events: none;
        }

        .phone-container {
            width: 100%; height: 100%; height: 100dvh;
            max-width: 414px; margin: 0 auto;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* ヘッダー：グラスモーフィズム */
        .nav-bar {
            height: 65px; display: flex; align-items: center; padding: 0 20px;
            background: rgba(10, 4, 8, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        .menu-btn { 
            color: var(--accent-gold); font-size: 28px; cursor: pointer; 
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .page-title-input {
            flex: 1; background: transparent; border: none; 
            color: var(--accent-gold); text-align: center;
            font-family: 'Playfair Display', serif; font-size: 22px; 
            font-style: italic; outline: none; letter-spacing: 1px;
        }

        /* 画像 & パラメータ */
        .fixed-header {
            display: flex; height: 280px; flex-shrink: 0; 
            background: linear-gradient(to bottom, transparent, #160811);
        }
        .image-area {
            width: 62%; display: flex; justify-content: center; align-items: center;
            position: relative; cursor: pointer; border-right: 1px solid var(--border);
            overflow: hidden;
        }
        .image-area img { width: 100%; height: 100%; object-fit: cover; }
        .image-area::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }

        .param-area {
            width: 38%; display: flex; flex-direction: column; justify-content: space-around;
            padding: 15px 0; background-color: rgba(20, 8, 15, 0.5);
        }
        .param-group { display: flex; flex-direction: column; align-items: center; }
        .param-label { 
            font-size: 11px; color: var(--text-sub); margin-bottom: 10px; 
            font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
        }
        .btn-ctrl { 
            background: none; border: none; color: var(--accent-gold); 
            font-size: 22px; padding: 5px 10px; cursor: pointer; opacity: 0.8;
        }
        .btn-ctrl:active { transform: scale(1.3); color: var(--accent-pink); }
        
        .indicator-container { display: flex; gap: 5px; }
        .bar { 
            width: 5px; height: 26px; background-color: rgba(255, 255, 255, 0.05); 
            border-radius: 10px; transition: 0.3s;
        }
        .bar.active { 
            background: linear-gradient(to bottom, var(--accent-pink), #80002b);
            box-shadow: 0 0 15px var(--accent-pink);
        }

        /* メモエリア */
        .scroll-content { 
            flex: 1; overflow-y: auto; padding: 25px; 
            background: linear-gradient(to bottom, #160811, var(--bg-dark));
        }
        .memo-label { 
            font-size: 10px; color: var(--accent-gold); 
            margin-bottom: 15px; letter-spacing: 3px; font-weight: bold;
        }
        .memo-textarea {
            width: 100%; height: 280px; background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border); border-radius: 15px; padding: 20px;
            color: #ddd; font-size: 16px; line-height: 1.8; outline: none;
            backdrop-filter: blur(5px);
        }

        /* サイドメニュー：魅惑的な透過 */
        .sidebar {
            position: absolute; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%;
            background: rgba(10, 4, 8, 0.95); backdrop-filter: blur(20px);
            z-index: 100; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 50px 30px; border-right: 1px solid var(--border);
        }
        .sidebar.open { left: 0; }
        .sidebar-header { 
            font-family: 'Playfair Display', serif; font-size: 28px; 
            color: var(--accent-gold); margin-bottom: 40px; font-style: italic;
        }
        .sidebar-item { 
            padding: 18px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.1); 
            color: var(--text-main); font-size: 15px; letter-spacing: 1px;
        }
        .setting-input-group label { font-size: 11px; color: var(--text-sub); }
        .setting-input-group input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            color: #fff; padding: 12px; font-size: 16px; border-radius: 8px; margin-top: 8px;
        }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 90; }
        .overlay.show { display: block; }
        input[type="file"] { display: none; }

        /* スクロールバー非表示 */
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<div class="phone-container" id="mainContainer">
    <!-- サイドメニュー -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Collection</div>
        <div id="page-list"></div>
        <div class="sidebar-item" onclick="addNewPage()" style="color: var(--accent-pink); font-weight: bold;">＋ Add New Story</div>
        
        <div style="margin-top: 40px; font-size: 11px; color: var(--accent-gold); letter-spacing: 2px;">SETTINGS</div>
        <div class="setting-input-group"><label>Parameter I</label><input type="text" id="set-p1" oninput="updateParamNames()"></div>
        <div class="setting-input-group"><label>Parameter II</label><input type="text" id="set-p2" oninput="updateParamNames()"></div>
        <div class="setting-input-group"><label>Parameter III</label><input type="text" id="set-p3" oninput="updateParamNames()"></div>
        
        <div class="sidebar-item" onclick="toggleMenu()" style="margin-top: 40px; text-align: center; opacity: 0.5; font-size: 12px;">Close</div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- ナビバー -->
    <div class="nav-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <input type="text" class="page-title-input" id="pageTitle" oninput="saveCurrentState()">
        <div style="width:40px;"></div>
    </div>

    <!-- 上部固定 -->
    <div class="fixed-header">
        <div class="image-area" onclick="document.getElementById('fileInput').click()">
            <div id="placeholder" style="color:var(--text-sub); font-size: 12px; letter-spacing: 2px;">TAP TO REVEAL</div>
            <img id="preview" style="display:none;">
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="param-area">
            <div class="param-group">
                <div class="param-label id-p1"></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-ctrl" onclick="changeVal('p1', -1)">◀</button>
                    <div class="indicator-container" id="ind-p1"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <button class="btn-ctrl" onclick="changeVal('p1', 1)">▶</button>
                </div>
            </div>
            <div class="param-group">
                <div class="param-label id-p2"></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-ctrl" onclick="changeVal('p2', -1)">◀</button>
                    <div class="indicator-container" id="ind-p2"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <button class="btn-ctrl" onclick="changeVal('p2', 1)">▶</button>
                </div>
            </div>
            <div class="param-group">
                <div class="param-label id-p3"></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-ctrl" onclick="changeVal('p3', -1)">◀</button>
                    <div class="indicator-container" id="ind-p3"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <button class="btn-ctrl" onclick="changeVal('p3', 1)">▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- スクロールエリア -->
    <div class="scroll-content" id="scrollArea">
        <div class="memo-label">SECRET NOTES</div>
        <textarea class="memo-textarea" id="memoField" oninput="saveCurrentState()" placeholder="Write your thoughts..."></textarea>
        <div style="height: 120px;"></div>
    </div>
</div>

<script>
    let appData = { currentIndex: 0, paramNames: ["近さ", "固さ", "見た目"], pages: [{ title: "Story 01", img: null, p1: 1, p2: 1, p3: 1, memo: "" }] };

    // --- キーボード高さズレ対策 ---
    function fixLayout() {
        window.scrollTo(0, 0);
        document.body.style.height = window.visualViewport.height + 'px';
    }
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', fixLayout);
        window.visualViewport.addEventListener('scroll', fixLayout);
    }
    document.addEventListener('focusout', () => {
        setTimeout(() => { window.scrollTo(0, 0); }, 50);
    });

    // --- 画像リサイズ保存（localStorage対策） ---
    function resizeImage(file, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500;
                let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // --- 保存 & 読み込み ---
    function saveToStorage() {
        try { localStorage.setItem('myAppData_SexyUI', JSON.stringify(appData)); } catch (e) { alert("Memory Full"); }
    }
    function loadFromStorage() {
        const saved = localStorage.getItem('myAppData_SexyUI');
        if (saved) { appData = JSON.parse(saved); }
        document.getElementById('set-p1').value = appData.paramNames[0];
        document.getElementById('set-p2').value = appData.paramNames[1];
        document.getElementById('set-p3').value = appData.paramNames[2];
        updateUI();
    }

    function updateUI() {
        const p = appData.pages[appData.currentIndex];
        document.getElementById('pageTitle').value = p.title;
        document.getElementById('memoField').value = p.memo;
        ['p1', 'p2', 'p3'].forEach((key, idx) => {
            document.querySelector(`.id-${key}`).innerText = appData.paramNames[idx];
            const bars = document.getElementById(`ind-${key}`).querySelectorAll('.bar');
            bars.forEach((bar, i) => bar.classList.toggle('active', i < p[key]));
        });
        const img = document.getElementById('preview'), ph = document.getElementById('placeholder');
        if (p.img) { img.src = p.img; img.style.display = 'block'; ph.style.display = 'none'; }
        else { img.style.display = 'none'; ph.style.display = 'block'; }
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
        renderPageList();
    }

    function changeVal(key, diff) {
        const next = appData.pages[appData.currentIndex][key] + diff;
        if (next >= 1 && next <= 5) {
            appData.pages[appData.currentIndex][key] = next;
            updateUI(); saveToStorage();
        }
    }

    function saveCurrentState() {
        appData.pages[appData.currentIndex].title = document.getElementById('pageTitle').value;
        appData.pages[appData.currentIndex].memo = document.getElementById('memoField').value;
        saveToStorage();
    }

    function updateParamNames() {
        appData.paramNames[0] = document.getElementById('set-p1').value;
        appData.paramNames[1] = document.getElementById('set-p2').value;
        appData.paramNames[2] = document.getElementById('set-p3').value;
        updateUI(); saveToStorage();
    }

    function addNewPage() {
        appData.pages.push({ title: `Story 0${appData.pages.length + 1}`, img: null, p1: 1, p2: 1, p3: 1, memo: "" });
        appData.currentIndex = appData.pages.length - 1;
        updateUI(); saveToStorage(); toggleMenu();
    }

    function switchPage(idx) {
        appData.currentIndex = idx;
        updateUI(); toggleMenu();
    }

    function renderPageList() {
        const list = document.getElementById('page-list');
        list.innerHTML = '';
        appData.pages.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.innerText = p.title || `Untitled ${i+1}`;
            item.onclick = () => switchPage(i);
            list.appendChild(item);
        });
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (e.target.files[0]) {
            resizeImage(e.target.files[0], (data) => {
                appData.pages[appData.currentIndex].img = data;
                updateUI(); saveToStorage();
            });
        }
    });

    window.onload = loadFromStorage;
</script>

</body>
</html>
